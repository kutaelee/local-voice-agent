schema_version: "1.0"
device: nvidia-rtx-5090
capacity:
  source: query_at_runtime
  require_preflight_vram_query: true
  require_measured_model_peak: true
  operating_headroom_percent: 20
priorities:
  - voice_interruption
  - tts_first_audio
  - active_12b_response
  - stt
  - approved_tool_work
  - 31b_analysis
  - image_video_generation
exclusive_rules:
  gemma4-31b:
    deny_concurrent:
      - image_generation
      - video_generation
  gemma4-31b-mtp:
    deny_concurrent:
      - image_generation
      - video_generation
      - other_gpu_model_load
oom:
  reject_when_peak_estimate_unknown: true
  unload_before_retry: true
  clear_only_runtime_owned_cache: true
  restart_failed_worker: true
  fallback_mode: gemma4-12b
measurements:
  gemma4-12b:
    peak_vram_mib: 18881
    measurement_kind: preliminary_poll_not_true_peak
  gemma4-12b-mtp:
    peak_vram_mib: 32050
    measurement_kind: preliminary_shared_host_poll_not_true_peak
    max_model_len: 2048
    gpu_memory_utilization: 0.90
    minimum_observed_free_vram_mib: 138
    sglang_cpu_offload_gib: 4
    sglang_health_observed_vram_mib: 28619
    sglang_runtime_available_memory_gib_after_kv: 4.39
    note: SGLang and vLLM fixed-condition 12B MTP ON/OFF measurements passed
  gemma4-31b:
    peak_vram_mib: 27187
    measurement_kind: preliminary_shared_host_poll_not_true_peak
    max_model_len: 256
    kv_cache_memory_bytes: 402653184
    max_num_seqs: 1
    minimum_observed_free_vram_mib: 5001
    note: first_utilization_based_launch_failed_after_weight_load_due_to_no_available_kv_cache
  gemma4-31b-mtp:
    peak_vram_mib: 27731
    measurement_kind: endpoint_snapshot_not_true_peak
    cpu_offload_gib: 36
    max_model_len: 256
    fixed_condition_samples_per_mode: 3
    production_enabled: false
    note: constrained vLLM ON/OFF passed; text-only and operationally too slow
  gemma4-12b-fallback:
    peak_vram_mib: 0
    measurement_kind: cpu_only_recovery_smoke
    gpu_peak_vram_mib: null
  qwen3-tts-1.7b:
    peak_allocated_vram_mib: 4531
    measurement_kind: torch_peak_allocated_single_clone_smoke
    prompt_cache_entries: 4
    note: primary TTS; reserve first-audio priority and unload for admitted 31B work
